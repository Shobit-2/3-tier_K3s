apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shobit-2/3-tier_K3s.git
    targetRevision: Latest
    path: user-manager/charts/user-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true
